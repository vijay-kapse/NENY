<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Career Map</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* ─── DESIGN TOKENS ───────────────────────────────── */
:root {
  --bg:      #f4f6f9;
  --bg2:     #e8ecf2;
  --bg3:     #dde2ea;
  --glass:   rgba(255,255,255,0.80);
  --glass2:  rgba(255,255,255,0.94);
  --label:   #0d1f4e;
  --label2:  #1a3060;
  --label3:  #5a6a8a;
  --label4:  #8796af;
  --sep:     rgba(13,31,78,0.12);
  --sep2:    rgba(13,31,78,0.06);
  --accent:  #4caf2e;
  --accent2: #3d9424;
}

body.dark {
  --bg:      #0d1423;
  --bg2:     #162135;
  --bg3:     #20304b;
  --glass:   rgba(13,20,35,0.88);
  --glass2:  rgba(16,25,42,0.96);
  --label:   #f4f8ff;
  --label2:  #d8e5ff;
  --label3:  #adc0e6;
  --label4:  #8ea6d5;
  --sep:     rgba(207,224,255,0.16);
  --sep2:    rgba(207,224,255,0.08);
  --accent:  #71e34c;
  --accent2: #5fcc39;
}

html, body {
  height:100%;
  font-family:'Inter', -apple-system, 'SF Pro Text', sans-serif;
  background:var(--bg);
  color:var(--label);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow:hidden;
  transition:background 0.35s, color 0.35s;
}

/* ─── NAVBAR ──────────────────────────────────────── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:48px;
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:0.5px solid var(--sep);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}

.nav-brand { display:flex; align-items:center; gap:8px; }
.nav-title  { font-size:15px; font-weight:600; letter-spacing:-0.3px; color:var(--label); }
.nav-sep    { width:1px; height:12px; background:var(--sep); }
.nav-sub    { font-size:12px; color:var(--label3); font-weight:400; }
.nav-right  { display:flex; align-items:center; gap:6px; }

.pill-search {
  display:flex; align-items:center; gap:6px;
  height:30px; padding:0 10px;
  background:var(--bg2); border:0.5px solid var(--sep);
  border-radius:10px; transition:all 0.2s;
}
.pill-search svg { color:var(--label4); flex-shrink:0; }
.pill-search input {
  background:none; border:none; outline:none;
  font-family:inherit; font-size:13px;
  color:var(--label); width:160px; transition:width 0.3s;
}
.pill-search input::placeholder { color:var(--label4); }
.pill-search input:focus { width:210px; }
.pill-search:focus-within {
  border-color:rgba(76,175,46,0.48);
  box-shadow:0 0 0 3px rgba(76,175,46,0.10);
}

.nav-btn {
  width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg2); border:0.5px solid var(--sep);
  border-radius:9px; cursor:pointer; color:var(--label3);
  transition:background 0.15s, color 0.15s, border-color 0.15s;
}
.nav-btn:hover { background:var(--bg3); color:var(--label); }
.nav-btn.on    { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ─── MAP STAGE ──────────────────────────────────── */
.stage {
  position:fixed; inset:48px 0 0 0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

.wheel-wrap {
  position:relative;
  width:min(84vmin, 820px);
  height:min(84vmin, 820px);
  transition:transform 0.4s ease;
  transform-origin:center;
}

.wheel-wrap.focus-mode {
  transform:scale(1.08);
}

.svg-layer {
  position:absolute; inset:0; width:100%; height:100%;
  pointer-events:none; overflow:visible;
}

/* ─── DOM OVERLAY LAYERS ─────────────────────────── */
#ringLabels, #catLabels {
  position:absolute; inset:0; pointer-events:none;
}
#stationsLayer {
  position:absolute; inset:0; pointer-events:all;
}

/* ─── RING LEVEL BADGES ──────────────────────────── */
.rlabel {
  position:absolute; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:2px;
  pointer-events:none;
}
.rlabel-pill {
  padding:3px 10px; border-radius:100px;
  font-size:9px; font-weight:700;
  letter-spacing:0.06em; text-transform:uppercase;
  white-space:nowrap;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:0.5px solid;
}
.rlabel-pill.entry  { background:rgba(76,175,46,0.14); border-color:rgba(76,175,46,0.42); color:#2d7a14; }
.rlabel-pill.mid    { background:rgba(26,74,191,0.12); border-color:rgba(26,74,191,0.36); color:#1a4abf; }
.rlabel-pill.senior { background:rgba(13,31,78,0.10);  border-color:rgba(13,31,78,0.30);  color:#0d1f4e; }

body.dark .rlabel-pill.entry  { background:rgba(113,227,76,0.16); border-color:rgba(113,227,76,0.42); color:#93f772; }
body.dark .rlabel-pill.mid    { background:rgba(91,137,255,0.16); border-color:rgba(91,137,255,0.42); color:#b7ccff; }
body.dark .rlabel-pill.senior { background:rgba(187,206,255,0.14); border-color:rgba(187,206,255,0.34); color:#e0ebff; }

.rlabel-sub { font-size:9px; color:var(--label4); font-weight:500; }

/* ─── CATEGORY LABELS ────────────────────────────── */
.clabel {
  position:absolute; transform:translate(-50%,-50%);
  font-size:9px; font-weight:700;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--label3); white-space:nowrap;
  pointer-events:none;
  text-shadow:0 1px 0 rgba(255,255,255,0.35);
}
body.dark .clabel {
  color:#d8e5ff;
  text-shadow:0 1px 2px rgba(0,0,0,0.40);
}

/* ─── STATION DOTS ───────────────────────────────── */
.dot {
  position:absolute; cursor:pointer;
  transform:translate(-50%,-50%);
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1), filter 0.22s;
  z-index:10;
}
.dot:hover, .dot.sel {
  transform:translate(-50%,-50%) scale(1.45);
  z-index:30;
}
.wheel-wrap.focus-mode .dot:not(.sel):not(.related) {
  filter:blur(1.5px);
  opacity:0.18;
}
.wheel-wrap.focus-mode .dot.related {
  animation:cascadePop 0.35s ease-out both;
}
.wheel-wrap.focus-mode .dot.sel {
  animation:cascadePop 0.42s ease-out both;
}
.dot.related {
  z-index:24;
}

.dot-circle {
  border-radius:50%;
  box-shadow:0 1px 4px rgba(0,0,0,0.18), 0 0 0 2.5px var(--bg);
  transition:box-shadow 0.2s, transform 0.2s;
}

.dot.entry  .dot-circle { width:10px; height:10px; background:#4caf2e; }
.dot.mid    .dot-circle { width:14px; height:14px; background:#1a4abf; }
.dot.senior .dot-circle { width:18px; height:18px; background:#0d1f4e; }

body.dark .dot.entry  .dot-circle { background:#71e34c; }
body.dark .dot.mid    .dot-circle { background:#5b89ff; }
body.dark .dot.senior .dot-circle { background:#bdd0ff; }

.dot:hover .dot-circle, .dot.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(26,74,191,0.18), 0 0 0 2.5px var(--bg);
}
.dot.entry:hover .dot-circle, .dot.entry.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(76,175,46,0.28), 0 0 0 2.5px var(--bg);
}
.dot.senior:hover .dot-circle, .dot.senior.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(13,31,78,0.22), 0 0 0 2.5px var(--bg);
}

.dot.related .dot-circle {
  box-shadow:0 0 0 4px rgba(26,74,191,0.14), 0 0 0 2.5px var(--bg);
}
body.dark .dot.related .dot-circle {
  box-shadow:0 0 0 4px rgba(122,160,255,0.22), 0 0 0 2.5px var(--bg);
}
body.dark .dot:hover .dot-circle, body.dark .dot.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(91,137,255,0.26), 0 0 0 2.5px var(--bg);
}
body.dark .dot.entry:hover .dot-circle, body.dark .dot.entry.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(113,227,76,0.30), 0 0 0 2.5px var(--bg);
}
body.dark .dot.senior:hover .dot-circle, body.dark .dot.senior.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(189,208,255,0.24), 0 0 0 2.5px var(--bg);
}

/* Tooltip / connected-label */
.dot-tip {
  position:absolute; bottom:calc(100% + 10px); left:50%;
  transform:translateX(-50%) translateY(4px);
  white-space:nowrap;
  font-size:11px; font-weight:600; color:var(--label);
  background:var(--glass2);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  padding:5px 10px; border-radius:8px;
  border:0.5px solid var(--sep);
  box-shadow:0 8px 24px rgba(0,0,0,0.10);
  pointer-events:none; opacity:0;
  transition:opacity 0.15s, transform 0.15s;
}
body.dark .dot-tip {
  background:rgba(17,26,43,0.98);
  border-color:rgba(207,224,255,0.18);
  color:#f6f9ff;
  box-shadow:0 10px 28px rgba(0,0,0,0.40);
}
.dot:hover .dot-tip,
.dot.sel .dot-tip,
.dot.show-label .dot-tip {
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* ─── CONNECTION LINES ───────────────────────────── */
.cline {
  fill:none;
  stroke-width:0.95;
  opacity:0;
  transition:opacity 0.25s, stroke-width 0.25s;
  stroke-linecap:round;
  stroke-dasharray:1.2 1.8;
}
.cline.on { opacity:0.62; stroke-width:1.12; }

.wheel-wrap.focus-mode .cline:not(.on) {
  opacity:0;
  filter:blur(0.6px);
}

.wheel-wrap.focus-mode #ringLabels,
.wheel-wrap.focus-mode #catLabels {
  opacity:0.2;
  filter:blur(1.3px);
}

@keyframes cascadePop {
  from { transform:translate(-50%,-50%) scale(0.85); }
  to   { transform:translate(-50%,-50%) scale(1.28); }
}

.cline.entry  { stroke:#4caf2e; }
.cline.mid    { stroke:#1a4abf; }
.cline.senior { stroke:#0d1f4e; }

body.dark .cline.entry  { stroke:#71e34c; }
body.dark .cline.mid    { stroke:#7aa0ff; }
body.dark .cline.senior { stroke:#d3e0ff; }

/* ─── DETAILS PANEL ──────────────────────────────── */
.panel {
  position:fixed; top:48px; right:-400px; bottom:0;
  width:360px;
  background:var(--glass2);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border-left:0.5px solid var(--sep);
  transition:right 0.4s cubic-bezier(0.4,0,0.2,1);
  z-index:150;
  display:flex; flex-direction:column;
  overflow:hidden;
  box-shadow:-10px 0 32px rgba(0,0,0,0.05);
}
body.dark .panel { box-shadow:-14px 0 36px rgba(0,0,0,0.30); }
.panel.open { right:0; }

.panel-header {
  padding:20px 20px 0;
  flex-shrink:0;
  position:relative;
}

.panel-close {
  position:absolute; top:14px; right:14px;
  width:26px; height:26px;
  background:var(--bg3); border:none;
  border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--label3); font-size:15px;
  transition:background 0.15s, color 0.15s;
}
.panel-close:hover { background:var(--sep); color:var(--label); }

.panel-badge {
  display:inline-flex; align-items:center;
  font-size:9px; font-weight:700;
  letter-spacing:0.06em; text-transform:uppercase;
  padding:3px 9px; border-radius:100px;
  margin-bottom:8px; border:0.5px solid;
}
.panel-badge.entry  { background:rgba(76,175,46,0.10); border-color:rgba(76,175,46,0.35); color:#2d7a14; }
.panel-badge.mid    { background:rgba(26,74,191,0.08); border-color:rgba(26,74,191,0.30); color:#1a4abf; }
.panel-badge.senior { background:rgba(13,31,78,0.08);  border-color:rgba(13,31,78,0.25);  color:#0d1f4e; }

body.dark .panel-badge.entry  { background:rgba(113,227,76,0.12); border-color:rgba(113,227,76,0.36); color:#9cf980; }
body.dark .panel-badge.mid    { background:rgba(91,137,255,0.12); border-color:rgba(91,137,255,0.36); color:#c4d5ff; }
body.dark .panel-badge.senior { background:rgba(189,208,255,0.12); border-color:rgba(189,208,255,0.26); color:#edf3ff; }

.panel-title {
  font-size:20px; font-weight:700;
  letter-spacing:-0.4px; line-height:1.2;
  color:var(--label); margin-bottom:16px;
}

.panel-divider { height:0.5px; background:var(--sep); margin:0 20px; }

.panel-body {
  flex:1; overflow-y:auto; padding:16px 20px 32px;
}
.panel-body::-webkit-scrollbar { width:4px; }
.panel-body::-webkit-scrollbar-track { background:transparent; }
.panel-body::-webkit-scrollbar-thumb { background:var(--sep); border-radius:2px; }

.prow { margin-bottom:16px; }
.prow-label {
  font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.05em;
  color:var(--label4); margin-bottom:4px;
}
.prow p { font-size:13px; line-height:1.58; color:var(--label2); }

.plist { list-style:none; }
.plist li {
  font-size:13px; line-height:1.5; color:var(--label2);
  padding:7px 0; border-bottom:0.5px solid var(--sep2);
  display:flex; align-items:center; gap:6px;
}
.plist li:last-child { border-bottom:none; }
.plist li.link { color:var(--accent); cursor:pointer; }
.plist li.link::before { content:'⟶'; font-size:11px; opacity:0.8; flex-shrink:0; color:var(--accent); }
.plist li.link:hover { text-decoration:underline; }

.skills-wrap { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.skill-chip {
  font-size:11px; padding:3px 9px;
  background:var(--bg2); border:0.5px solid var(--sep);
  border-radius:6px; color:var(--label2);
}

/* ─── FILTER PANEL ───────────────────────────────── */
.fp {
  position:fixed; top:48px; right:-260px; bottom:0;
  width:228px;
  background:var(--glass2);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border-left:0.5px solid var(--sep);
  transition:right 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index:149;
  padding:16px;
  overflow-y:auto;
}
body.dark .fp { box-shadow:-10px 0 28px rgba(0,0,0,0.25); }
.fp.open { right:0; }
.fp-head { font-size:12px; font-weight:700; color:var(--label); margin-bottom:14px; }
.fp-section { margin-bottom:16px; }
.fp-section-label {
  font-size:9px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.07em; color:var(--label4); margin-bottom:6px;
}
.fp-row {
  padding:6px 8px; font-size:13px; cursor:pointer;
  color:var(--label3); border-radius:7px;
  transition:background 0.12s, color 0.12s;
  display:flex; align-items:center; gap:6px;
}
.fp-row:hover { background:var(--bg2); color:var(--label); }
.fp-row.on { color:var(--accent); font-weight:600; }
.fp-row.on::before {
  content:''; width:6px; height:6px;
  border-radius:50%; background:var(--accent); flex-shrink:0;
}

/* ─── LOADING / STATES ───────────────────────────── */
.loader {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; z-index:50;
}
.loader-ring {
  width:28px; height:28px;
  border:2.5px solid var(--sep);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.loader-text { font-size:13px; color:var(--label3); }

.err-state {
  position:absolute; inset:0;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
.err-state p { font-size:13px; color:var(--label3); }
.err-btn {
  font-size:13px; padding:7px 16px;
  background:var(--accent); color:#fff;
  border:none; border-radius:9px; cursor:pointer;
  font-family:inherit;
  transition:background 0.15s;
}
.err-btn:hover { background:var(--accent2); }

.empty-msg {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:6px;
}
.empty-msg h3 { font-size:16px; font-weight:600; color:var(--label); }
.empty-msg p {
  font-size:13px; color:var(--label3);
  max-width:220px; text-align:center; line-height:1.5;
}

@media(max-width:640px) { .nav-sub, .nav-sep { display:none; } }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <span class="nav-title">Career Map</span>
    <div class="nav-sep"></div>
    <span class="nav-sub">Inner → outer = career progression</span>
  </div>
  <div class="nav-right">
    <div class="pill-search">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="6.5" cy="6.5" r="5"></circle>
        <path d="M10.5 10.5l3 3"></path>
      </svg>
      <input type="text" id="searchInput" placeholder="Search roles…" />
    </div>
    <button class="nav-btn" id="themeBtn" onclick="toggleTheme()">
      <svg id="iMoon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg id="iSun" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="display:none">
        <circle cx="12" cy="12" r="4.5"></circle>
        <line x1="12" y1="2" x2="12" y2="5"></line>
        <line x1="12" y1="19" x2="12" y2="22"></line>
        <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"></line>
        <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"></line>
        <line x1="2" y1="12" x2="5" y2="12"></line>
        <line x1="19" y1="12" x2="22" y2="12"></line>
        <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"></line>
        <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"></line>
      </svg>
    </button>
    <button class="nav-btn" id="filterBtn" onclick="toggleFP()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M2 4h12M4 8h8M6 12h4"></path>
      </svg>
    </button>
  </div>
</nav>

<div class="stage" id="stage">
  <div class="wheel-wrap" id="wheelWrap" style="display:none">
    <svg class="svg-layer" id="svgBase" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="ringLabels"></div>
    <div id="catLabels"></div>
    <div id="stationsLayer"></div>
    <svg class="svg-layer" id="svgLines" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
         style="pointer-events:none; position:absolute; inset:0; z-index:20"></svg>
  </div>

  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading…</div>
  </div>

  <div class="err-state" id="errState">
    <p>Could not load data</p>
    <button class="err-btn" onclick="loadData()">Retry</button>
  </div>
</div>

<div class="fp" id="fp">
  <div class="fp-head">Filter</div>

  <div class="fp-section">
    <div class="fp-section-label">Level</div>
    <div class="fp-row on" data-f="level" data-v="all" onclick="setF('level','all')">All levels</div>
    <div class="fp-row" data-f="level" data-v="Entry" onclick="setF('level','Entry')">Entry</div>
    <div class="fp-row" data-f="level" data-v="Mid-Level" onclick="setF('level','Mid-Level')">Mid-Level</div>
    <div class="fp-row" data-f="level" data-v="Senior" onclick="setF('level','Senior')">Senior</div>
  </div>

  <div class="fp-section">
    <div class="fp-section-label">Category</div>
    <div class="fp-row on" data-f="category" data-v="all" onclick="setF('category','all')">All categories</div>
    <div id="fpCats"></div>
  </div>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">×</button>
    <div id="panelTop"></div>
  </div>
  <div class="panel-divider"></div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
const SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ39S2y1A-CLOiFGe2WZrFwj9ZKiN7959oZY2FrnmeluW8dwx3bXFMSzIKZE4EASy0N6B-QuJkH210Q/pub?output=csv';

let roles = [];
let filtered = [];
let roleById = new Map();
let filt = { level:'all', category:'all', search:'' };
let isDark = false;
let positions = {};
let activeRoleId = null;
let labelPlaced = [];

/* Entry roles now sit very close to the center */
const BANDS = {
  entry:  { rMin:5.0,  rMax:11.5 },
  mid:    { rMin:22,   rMax:33 },
  senior: { rMin:38,   rMax:46 }
};

const RLABEL = {
  entry:  { r:9,  lbl:'Entry',     sub:'Early career' },
  mid:    { r:27, lbl:'Mid-Level', sub:'Growth roles' },
  senior: { r:42, lbl:'Senior',    sub:'Leadership' }
};

const PIE_COLORS_LIGHT = [
  '#7FB3FF', '#6ED8B3', '#FFD36B', '#FFA878',
  '#C59BFF', '#78D7FF', '#A9D96E', '#FF93C5',
  '#94ABFF', '#FFBF70', '#58C6C0', '#F7A4A4'
];

const PIE_COLORS_DARK = [
  '#4E83FF', '#00C78A', '#F2B700', '#FF7B47',
  '#9A6BFF', '#26C0FF', '#82CB1E', '#FF5EA5',
  '#748DFF', '#FF9F1A', '#10B5AD', '#FF7F7F'
];

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('iMoon').style.display = isDark ? 'none' : '';
  document.getElementById('iSun').style.display  = isDark ? '' : 'none';
  if (filtered.length) layout();
}

async function loadData() {
  showState('loading');
  try {
    const res = await fetch(SHEET);
    if (!res.ok) throw new Error('Network error');
    roles = parseCSV(await res.text());
    if (!roles.length) throw new Error('Empty data');

    roleById = new Map(roles.map(r => [r.id, r]));
    filtered = [...roles];
    buildCatFilters();

    showState('wheel');
    window.roles = roles;

    requestAnimationFrame(() => setTimeout(layout, 30));
  } catch (err) {
    console.error(err);
    showState('error');
  }
}

function showState(s) {
  document.getElementById('loader').style.display = s === 'loading' ? 'flex' : 'none';
  document.getElementById('errState').style.display = s === 'error' ? 'flex' : 'none';
  document.getElementById('wheelWrap').style.display = s === 'wheel' ? 'block' : 'none';
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return [];

  const hdr = splitCSVLine(lines[0]);
  const out = [];

  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    const row = {};
    hdr.forEach((h, j) => row[h] = (vals[j] || '').trim());

    row.connections = row.connections
      ? row.connections.split(',').map(c => c.trim()).filter(Boolean)
      : [];

    row.skills = row.skills
      ? row.skills.split(',').map(s => s.trim()).filter(Boolean)
      : [];

    if (row.id && row.title) out.push(row);
  }

  return out;
}

function splitCSVLine(line) {
  const vals = [];
  let cur = '';
  let inQ = false;

  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    const next = line[i + 1];

    if (ch === '"' && inQ && next === '"') {
      cur += '"';
      i++;
    } else if (ch === '"') {
      inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      vals.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  vals.push(cur);
  return vals;
}

function buildCatFilters() {
  const cats = [...new Set(roles.map(r => r.category).filter(Boolean))].sort();
  document.getElementById('fpCats').innerHTML = cats.map(c =>
    `<div class="fp-row" data-f="category" data-v="${escapeAttr(c)}" onclick="setF('category', ${JSON.stringify(c)})">${escapeHTML(c)}</div>`
  ).join('');
}

function escapeHTML(str = '') {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function escapeAttr(str = '') {
  return escapeHTML(str);
}

function hash01(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return (h % 1000) / 1000;
}

function polar(cx, cy, r, a) {
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}

function arcSlice(cx, cy, r0, r1, a0, a1) {
  const p1 = polar(cx, cy, r1, a0);
  const p2 = polar(cx, cy, r1, a1);
  const p3 = polar(cx, cy, r0, a1);
  const p4 = polar(cx, cy, r0, a0);
  const laf = a1 - a0 > Math.PI ? 1 : 0;

  return `M${p1.x} ${p1.y}
          A${r1} ${r1} 0 ${laf} 1 ${p2.x} ${p2.y}
          L${p3.x} ${p3.y}
          A${r0} ${r0} 0 ${laf} 0 ${p4.x} ${p4.y}
          Z`;
}

function levelKey(level) {
  return level === 'Entry' ? 'entry' : level === 'Mid-Level' ? 'mid' : 'senior';
}

function getRenderableConnections(role) {
  const raw = (role.connections || []).filter(id => roleById.has(id));
  const targets = raw.map(id => roleById.get(id)).filter(Boolean);

  if (role.level === 'Entry') {
    const outward = targets.filter(r => r.level === 'Mid-Level').map(r => r.id);
    return outward.length ? outward : raw;
  }

  if (role.level === 'Mid-Level') {
    const outward = targets.filter(r => r.level === 'Senior').map(r => r.id);
    return outward.length ? outward : raw;
  }

  return raw;
}

function getNeighborIds(roleId) {
  const set = new Set();
  const role = roleById.get(roleId);
  if (!role) return set;

  getRenderableConnections(role).forEach(id => set.add(id));

  filtered.forEach(r => {
    if (getRenderableConnections(r).includes(roleId)) set.add(r.id);
  });

  set.delete(roleId);
  return set;
}


function calcNodeRadiusPct(level) {
  if (level === 'Entry') return 1.8;
  if (level === 'Mid-Level') return 2.1;
  return 2.5;
}

function overlaps(x, y, r, placed, pad = 0.9) {
  return placed.some(p => {
    const dx = p.x - x;
    const dy = p.y - y;
    const minD = p.r + r + pad;
    return (dx * dx + dy * dy) < (minD * minD);
  });
}

function placeRoleWithoutOverlap({ role, a0, a1, band, k, placed }) {
  const steps = 36;
  const baseJitter = hash01(role.id + k);
  for (let attempt = 0; attempt < steps; attempt++) {
    const t = (attempt + 1) / (steps + 1);
    const angle = a0 + t * (a1 - a0);
    const spread = k === 'entry' ? 0.68 : 0.9;
    const radialMix = Math.min(0.98, (0.1 + baseJitter * spread) + attempt * 0.018);
    const r = band.rMin + radialMix * (band.rMax - band.rMin);
    const pos = polar(50, 50, r, angle);
    const pr = calcNodeRadiusPct(role.level);
    if (!overlaps(pos.x, pos.y, pr, placed, 0.72)) {
      return { x: pos.x, y: pos.y, r: pr };
    }
  }

  const fallbackAngle = a0 + 0.5 * (a1 - a0);
  const fallbackR = band.rMax;
  const pos = polar(50, 50, fallbackR, fallbackAngle);
  return { x: pos.x, y: pos.y, r: calcNodeRadiusPct(role.level) };
}

function layout() {
  const $svg   = document.getElementById('svgBase');
  const $lines = document.getElementById('svgLines');
  const $st    = document.getElementById('stationsLayer');
  const $rl    = document.getElementById('ringLabels');
  const $cl    = document.getElementById('catLabels');

  $svg.innerHTML = '';
  $lines.innerHTML = '';
  $st.innerHTML = '';
  $rl.innerHTML = '';
  $cl.innerHTML = '';
  positions = {};
  labelPlaced = [];

  if (!filtered.length) {
    closePanel(false);
    $st.innerHTML = '<div class="empty-msg"><h3>No matches</h3><p>Adjust your filters or clear the search.</p></div>';
    return;
  }

  const cx = 50, cy = 50;
  const cats = [...new Set(filtered.map(r => r.category).filter(Boolean))];
  const sliceAngle = cats.length ? (2 * Math.PI) / cats.length : 0;
  const pieColors = isDark ? PIE_COLORS_DARK : PIE_COLORS_LIGHT;

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

  const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  marker.setAttribute('id', 'flowTick');
  marker.setAttribute('markerUnits', 'userSpaceOnUse');
  marker.setAttribute('markerWidth', '3.4');
  marker.setAttribute('markerHeight', '2.4');
  marker.setAttribute('refX', '1.7');
  marker.setAttribute('refY', '1.2');
  marker.setAttribute('orient', 'auto');

  const markerPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  markerPath.setAttribute('d', 'M0.35,2.05 L1.7,0.35 L3.05,2.05');
  markerPath.setAttribute('fill', 'none');
  markerPath.setAttribute('stroke', isDark ? 'rgba(211,224,255,0.72)' : 'rgba(26,74,191,0.55)');
  markerPath.setAttribute('stroke-width', '0.30');
  markerPath.setAttribute('stroke-linecap', 'round');
  markerPath.setAttribute('stroke-linejoin', 'round');

  marker.appendChild(markerPath);
  defs.appendChild(marker);

  $svg.appendChild(defs);

  cats.forEach((cat, i) => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'radialGradient');
    g.setAttribute('id', `pg${i}`);
    g.setAttribute('gradientUnits', 'userSpaceOnUse');
    g.setAttribute('cx', cx);
    g.setAttribute('cy', cy);
    g.setAttribute('r', '50');

    const color = pieColors[i % pieColors.length];
    const peakOpacity = isDark ? 0.90 : 0.78;
    const edgeOpacity = isDark ? 0.24 : 0.20;
    const centerOpacity = isDark ? 0.10 : 0.08;

    [
      ['0%',   centerOpacity],
      ['48%',  peakOpacity],
      ['100%', edgeOpacity]
    ].forEach(([offset, opacity]) => {
      const stop = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop.setAttribute('offset', offset);
      stop.setAttribute('stop-color', color);
      stop.setAttribute('stop-opacity', String(opacity));
      g.appendChild(stop);
    });

    defs.appendChild(g);
  });

  cats.forEach((cat, i) => {
    const a0 = -Math.PI / 2 + i * sliceAngle;
    const a1 = a0 + sliceAngle;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', arcSlice(cx, cy, 4, 49, a0, a1));
    path.style.fill = `url(#pg${i})`;
    path.style.stroke = isDark ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.80)';
    path.style.strokeWidth = '0.35';
    $svg.appendChild(path);

    const lp = polar(cx, cy, 46.6, (a0 + a1) / 2);
    const lbl = document.createElement('div');
    lbl.className = 'clabel';
    lbl.textContent = cat;
    lbl.style.left = lp.x + '%';
    lbl.style.top  = lp.y + '%';
    $cl.appendChild(lbl);
  });

  const byLevel = { Entry:[], 'Mid-Level':[], Senior:[] };
  filtered.forEach(r => { if (byLevel[r.level]) byLevel[r.level].push(r); });

  ['entry', 'mid', 'senior'].forEach(k => {
    const lk = k === 'entry' ? 'Entry' : k === 'mid' ? 'Mid-Level' : 'Senior';
    if (!byLevel[lk].length) return;

    const cfg = RLABEL[k];
    const wrap = document.createElement('div');
    wrap.className = 'rlabel';
    wrap.style.left = '50%';
    wrap.style.top = (50 - cfg.r) + '%';
    wrap.innerHTML = `
      <div class="rlabel-pill ${k}">${cfg.lbl}</div>
      <div class="rlabel-sub">${cfg.sub}</div>
    `;
    $rl.appendChild(wrap);
  });

  const byCat = {};
  filtered.forEach(r => {
    const c = r.category || 'Other';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(r);
  });

  cats.forEach((cat, ci) => {
    const catRoles = byCat[cat] || [];
    if (!catRoles.length) return;

    const a0 = -Math.PI / 2 + ci * sliceAngle;
    const a1 = a0 + sliceAngle;

    const byLv = { Entry:[], 'Mid-Level':[], Senior:[] };
    catRoles.forEach(r => { if (byLv[r.level]) byLv[r.level].push(r); });

    ['Entry', 'Mid-Level', 'Senior'].forEach(lk => {
      const lRoles = byLv[lk];
      if (!lRoles.length) return;

      const k = levelKey(lk);
      const band = BANDS[k];

      lRoles.forEach((role) => {
        const pos = placeRoleWithoutOverlap({ role, a0, a1, band, k, placed: labelPlaced });
        labelPlaced.push(pos);
        positions[role.id] = { x: pos.x, y: pos.y };

        const el = document.createElement('div');
        el.className = `dot ${k}`;
        el.dataset.id = role.id;
        el.style.left = pos.x + '%';
        el.style.top  = pos.y + '%';
        el.innerHTML = `
          <div class="dot-circle"></div>
          <div class="dot-tip">${escapeHTML(role.title)}</div>
        `;
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          openPanel(role);
        });

        $st.appendChild(el);
      });
    });
  });

  filtered.forEach(role => {
    const src = positions[role.id];
    if (!src) return;

    const renderable = getRenderableConnections(role);
    renderable.forEach(cid => {
      const tgt = positions[cid];
      if (!tgt) return;

      const targetRole = roleById.get(cid);
      if (!targetRole) return;

      const k = levelKey(targetRole.level);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', src.x);
      line.setAttribute('y1', src.y);
      line.setAttribute('x2', tgt.x);
      line.setAttribute('y2', tgt.y);
      line.setAttribute('class', `cline ${k}`);
      line.setAttribute('marker-mid', 'url(#flowTick)');
      line.dataset.src = role.id;
      line.dataset.tgt = cid;

      $lines.appendChild(line);
    });
  });

  if (activeRoleId && positions[activeRoleId]) {
    applyActiveState(activeRoleId);
    const activeRole = roleById.get(activeRoleId);
    if (activeRole) renderPanel(activeRole);
  } else if (activeRoleId && !positions[activeRoleId]) {
    closePanel(false);
  }
}

function applyActiveState(roleId) {
  document.getElementById('wheelWrap').classList.add('focus-mode');
  const neighborIds = getNeighborIds(roleId);

  document.querySelectorAll('.cline').forEach(l => {
    const isOn = l.dataset.src === roleId || l.dataset.tgt === roleId;
    l.classList.toggle('on', isOn);
  });

  document.querySelectorAll('.dot').forEach(d => {
    const id = d.dataset.id;
    d.classList.toggle('sel', id === roleId);
    d.classList.toggle('related', neighborIds.has(id));
    d.classList.toggle('show-label', neighborIds.has(id));
  });
}

function clearActiveState() {
  document.getElementById('wheelWrap').classList.remove('focus-mode');
  document.querySelectorAll('.dot').forEach(d => {
    d.classList.remove('sel', 'related', 'show-label');
  });
  document.querySelectorAll('.cline').forEach(l => l.classList.remove('on'));
}

function openPanel(role) {
  activeRoleId = role.id;
  applyActiveState(role.id);
  renderPanel(role);
  document.getElementById('panel').classList.add('open');
}

function renderPanel(role) {
  const k = levelKey(role.level);

  document.getElementById('panelTop').innerHTML = `
    <div class="panel-badge ${k}">${escapeHTML(role.level)}</div>
    <div class="panel-title">${escapeHTML(role.title)}</div>
  `;

  const skillsHTML = (role.skills || []).length
    ? `<div class="skills-wrap">${role.skills.map(s => `<span class="skill-chip">${escapeHTML(s)}</span>`).join('')}</div>`
    : '<p>—</p>';

  const displayConnections = getRenderableConnections(role);
  const pathsHTML = displayConnections.length
    ? `<ul class="plist">${
        displayConnections.map(id => {
          const cr = roleById.get(id);
          return cr
            ? `<li class="link" onclick="openPanelById(${JSON.stringify(id)})">${escapeHTML(cr.title)}</li>`
            : '';
        }).join('')
      }</ul>`
    : '<p style="font-size:13px;color:var(--label3)">No direct paths listed</p>';

  document.getElementById('panelBody').innerHTML = `
    <div class="prow">
      <div class="prow-label">Category</div>
      <p>${escapeHTML(role.category || '—')} · ${escapeHTML(role.level || '—')}</p>
    </div>
    <div class="prow">
      <div class="prow-label">Salary Range</div>
      <p>${escapeHTML(role.salary || '—')}</p>
    </div>
    <div class="prow">
      <div class="prow-label">About this role</div>
      <p>${escapeHTML(role.description || '—')}</p>
    </div>
    <div class="prow">
      <div class="prow-label">Education</div>
      <p>${escapeHTML(role.education || '—')}</p>
    </div>
    <div class="prow">
      <div class="prow-label">Skills</div>
      ${skillsHTML}
    </div>
    <div class="prow">
      <div class="prow-label">Career paths from here (arrowed progression)</div>
      ${pathsHTML}
    </div>
  `;
}

function openPanelById(id) {
  const role = roleById.get(id);
  if (!role) return;
  openPanel(role);
}

function closePanel(resetActive = true) {
  document.getElementById('panel').classList.remove('open');
  clearActiveState();
  if (resetActive) activeRoleId = null;
}

function doFilter() {
  const s = filt.search.toLowerCase();

  filtered = roles.filter(r => {
    if (filt.level !== 'all' && r.level !== filt.level) return false;
    if (filt.category !== 'all' && r.category !== filt.category) return false;

    if (s) {
      const hay = `${r.title || ''} ${r.description || ''}`.toLowerCase();
      if (!hay.includes(s)) return false;
    }

    return true;
  });

  layout();
}

function setF(type, val) {
  filt[type] = val;
  document.querySelectorAll(`[data-f="${type}"]`).forEach(e => e.classList.remove('on'));
  document.querySelector(`[data-f="${type}"][data-v="${CSS.escape(val)}"]`)?.classList.add('on');
  doFilter();
}

function toggleFP() {
  document.getElementById('fp').classList.toggle('open');
  document.getElementById('filterBtn').classList.toggle('on');
}

document.getElementById('searchInput').addEventListener('input', e => {
  filt.search = e.target.value;
  doFilter();
});

document.addEventListener('click', (e) => {
  const clickedInsideDot = e.target.closest('.dot');
  const clickedInsidePanel = e.target.closest('.panel');

  if (!clickedInsideDot && !clickedInsidePanel) {
    closePanel();
  }
});

window.roles = roles;
window.openPanel = openPanel;
window.openPanelById = openPanelById;
window.loadData = loadData;
window.setF = setF;
window.toggleTheme = toggleTheme;

window.addEventListener('load', loadData);

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (filtered.length) layout();
  }, 180);
});
</script>
</body>
